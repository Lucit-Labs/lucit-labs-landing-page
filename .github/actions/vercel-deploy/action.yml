name: "Vercel Deploy"
description: "Deploys a prebuilt project to Vercel and optionally aliases it"

inputs:
  vercel_token:
    description: "Vercel API token"
    required: true
  vercel_org_id:
    description: "Vercel organization ID"
    required: true
  vercel_project_id:
    description: "Vercel project ID"
    required: true
  is_production:
    description: "Whether this is a production deploy"
    required: true
  alias:
    description: "Custom domain alias for preview deploys"
    required: false
    default: ""

outputs:
  deploy_url:
    description: "The deployment URL"
    value: ${{ steps.deploy.outputs.deploy_url }}

runs:
  using: "composite"
  steps:
    - name: Deploy to Vercel
      id: deploy
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
      run: |
        if [ "${{ inputs.is_production }}" = "true" ]; then
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt --prod --token=${{ inputs.vercel_token }})
        else
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt --token=${{ inputs.vercel_token }})
        fi
        echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

    - name: Alias to stable domain
      if: inputs.alias != ''
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
      run: |
        npx vercel@latest alias ${{ steps.deploy.outputs.deploy_url }} ${{ inputs.alias }} \
          --scope=${{ inputs.vercel_org_id }} \
          --token=${{ inputs.vercel_token }}
